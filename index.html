<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capital Manager Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Chart.js для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f141c;
            --card-bg: #1a222d;
            --card-border: #263242;
            --text-primary: #ffffff;
            --text-secondary: #8d9aab;
            --accent-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .total-amount {
            font-size: 30px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .total-amount span {
            color: var(--accent-green);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text-primary);
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin: 0 0 12px 4px;
        }

        .accounts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .account-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .acc-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .acc-balance {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            padding: 20px;
        }

        .loader {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="subtitle">Финансовый капитал</div>
        <div class="total-amount" id="total-balance">0.00 <span>PLN</span></div>
    </div>

    <div class="card">
        <div class="card-title">Расходы по категориям</div>
        <div class="chart-container">
            <canvas id="expensesChart"></canvas>
        </div>
    </div>

    <div class="section-title">Мои счета</div>
    <div class="accounts-list" id="accounts-list">
        <div class="loader">Загрузка данных с сервера...</div>
    </div>

    <script>
        // ⚠️ ОБЯЗАТЕЛЬНО УКАЖИ ЗДЕСЬ ПУБЛИЧНЫЙ IP ИЛИ ДОМЕН СВОЕГО СЕРВЕРА
        const API_URL = "https://competitive-energy-evaluations-berlin.trycloudflare.com";

        // Инициализируем Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        let chartInstance = null;

        async function loadDashboardData() {
            // Достаем Telegram ID текущего пользователя
            const userId = tg?.initDataUnsafe?.user?.id || 123456; 

            try {
                const response = await fetch(`${API_BASE_URL}/api/dashboard?user_id=${userId}`);
                const data = await response.json();

                if (data.error) {
                    console.error("Ошибка API:", data.error);
                    document.getElementById("accounts-list").innerHTML = `<div class="empty-state">Ошибка: ${data.error}</div>`;
                    return;
                }

                // 1. Выводим общий капитал в PLN
                const formattedTotal = data.total_balance_pln.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById("total-balance").innerHTML = `${formattedTotal} <span>PLN</span>`;

                // 2. Отрисовываем счета из базы
                const accountsContainer = document.getElementById("accounts-list");
                if (data.accounts && data.accounts.length > 0) {
                    accountsContainer.innerHTML = "";
                    data.accounts.forEach(acc => {
                        const formattedBalance = acc.balance.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                        const accElement = document.createElement("div");
                        accElement.className = "account-card";
                        accElement.innerHTML = `
                            <span class="acc-name">${acc.name}</span>
                            <span class="acc-balance">${formattedBalance} ${acc.currency}</span>
                        `;
                        accountsContainer.appendChild(accElement);
                    });
                } else {
                    accountsContainer.innerHTML = '<div class="empty-state">Счета не найдены</div>';
                }

                // 3. Рисуем круговую диаграмму расходов
                if (data.expenses_by_category && Object.keys(data.expenses_by_category).length > 0) {
                    const categories = Object.keys(data.expenses_by_category);
                    const amounts = Object.values(data.expenses_by_category);
                    renderChart(categories, amounts);
                } else {
                    renderChart(["Нет расходов"], [1]);
                }

            } catch (err) {
                console.error("Ошибка соединения с API:", err);
                document.getElementById("accounts-list").innerHTML = '<div class="empty-state">Не удалось подключиться к серверу</div>';
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('expensesChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            const palette = [
                '#10b981', '#3b82f6', '#f59e0b', '#ec4899', 
                '#8b5cf6', '#14b8a6', '#f97316', '#64748b'
            ];

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: palette.slice(0, labels.length),
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#8d9aab',
                                font: { size: 12 },
                                padding: 14,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        }
                    },
                    cutout: '72%'
                }
            });
        }

        document.addEventListener("DOMContentLoaded", loadDashboardData);
    </script>
</body>
</html>
